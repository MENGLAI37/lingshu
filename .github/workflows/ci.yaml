name: CI

permissions:
  security-events: write  
  contents: read          

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]
  merge_group:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26'
  GOLANGCI_LINT_VERSION: 'v1.59.0'

jobs:
  # ===========================================================================
  # Job 1: Lint - Code quality checks
  # ===========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  # ===========================================================================
  # Job 2: Test - Unit tests with coverage
  # ===========================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: ./coverage.out
          flags: unittests
          name: lingshu
          fail_ci_if_error: false

      - name: Generate coverage report
        run: |
          go install github.com/AlekSi/gocov-xml@latest
          gocov-xml convert coverage.out > coverage.xml || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ===========================================================================
  # Job 3: Build - Compile binaries
  # ===========================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build lingshu
        run: |
          mkdir -p bin/${{ matrix.goos }}_${{ matrix.goarch }}
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-s -w -X main.Version=${{ github.sha }}" \
            -o bin/lingshu ./cmd/lingshu

      - name: Build lingshu-alertd
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-s -w -X main.Version=${{ github.sha }}" \
            -o bin/lingshu-alertd ./cmd/alertd

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/*
          retention-days: 5

  # ===========================================================================
  # Job 4: Security scan
  # ===========================================================================
  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run gosec security scanner
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt sarif -out gosec-results.sarif ./...'

      - name: Upload gosec results
        uses: github/codeql-action/upload-sarif@v3
        if: success()
        with:
          sarif_file: gosec-results.sarif

  # ===========================================================================
  # Job 5: Dependency verification
  # ===========================================================================
  deps:
    name: Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Check for uncommitted dependencies
        run: |
          go mod tidy
          git diff --exit-code

  # ===========================================================================
  # Job 6: Integration test (optional - requires kind)
  # ===========================================================================
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-amd64
          path: bin/

      - name: Set executable permission
        run: chmod +x bin/*

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: lingshu-test
          node_image: kindest/node:v1.30.0

      - name: Create namespace
        run: kubectl create namespace test-apps --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy test applications
        run: kubectl apply -f deployments/k8s/test-apps.yaml

      - name: Wait for deployments
        run: |
          kubectl wait --for=condition=available deployment/nginx-test --namespace=test-apps --timeout=120s || true
          kubectl wait --for=condition=available deployment/redis-test --namespace=test-apps --timeout=120s || true

      - name: Run integration tests
        run: |
          # Placeholder for integration test suite
          echo "Integration tests would run here"
          kubectl get pods -n test-apps

      - name: Export kind logs
        if: failure()
        uses: ./.github/actions/export-kind-logs
        with:
          cluster_name: lingshu-test

      - name: Cleanup kind cluster
        if: always()
        run: kind delete cluster --name lingshu-test || true

  # ===========================================================================
  # Summary
  # ===========================================================================
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [lint, test, build, security, deps]
    if: always()
    steps:
      - name: Check job statuses
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Deps: ${{ needs.deps.result }}"
          
          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.test.result }}" == "failure" ]] || \
             [[ "${{ needs.build.result }}" == "failure" ]] || \
             [[ "${{ needs.security.result }}" == "failure" ]] || \
             [[ "${{ needs.deps.result }}" == "failure" ]]; then
            echo "CI FAILED"
            exit 1
          fi
          echo "CI PASSED"
