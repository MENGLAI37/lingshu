version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

output:
  format: colored-line-number

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - copyloopvar
    - contextcheck
    - decorder
    - dupword
    - errname
    - gosec
    - noctx
    - nilerr
    - nilnil
    - prealloc
    - reassign
    - revive
    - unconvert
    - unparam
    - whitespace

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gosec:
      excludes:
        - G104
        - G204
    govet:
      enable-all: true
    staticcheck:
      checks:
        - all
        - "-SA1019"
    revive:
      rules:
        - blank-imports
        - context-as-argument
        - context-keys-type
        - dot-imports
        - error-return
        - error-strings
        - error-naming
        - exported
        - increment-decrement
        - var-naming
        - var-declaration
        - package-comments
        - range
        - receiver-naming
        - time-naming
        - unexported-return
        - indent-error-flow
        - errorf
    dupl:
      threshold: 150
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
    gocyclo:
      min-complexity: 15
    goimports:
      local-prefixes: github.com/lingshu/lingshu
    lll:
      line-length: 120
    misspell:
      locale: US
    gocognit:
      min-complexity: 30
    prealloc:
      for-loops: true
    funlen:
      lines: 80
      statements: 40
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/lingshu/lingshu)

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    - path: "_test\\.go"
      linters:
        - dupl
        - funlen
        - gocyclo
        - gocognit
        - gosec
        - testpackage
    - path: "migrations/"
      linters:
        - gci
    - path: "cmd/"
      linters:
        - noctx
    - path: "vendor/"
      linters:
        - staticcheck
