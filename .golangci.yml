version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - copyloopvar
    - contextcheck
    - gosec
    - nilerr
    - prealloc
    - revive
    - unconvert
    - unparam

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gosec:
      excludes:
        - G104
        - G204
    govet:
      enable-all: true
    staticcheck:
      checks:
        - all
    gocyclo:
      min-complexity: 15
    funlen:
      lines: 80
      statements: 40
