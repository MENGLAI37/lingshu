run:
  timeout: 5m
  modules-download-mode: readonly
  issues-exit-code: 1

output:
  formats:
    - format: "colored-line-number"
      path: "stdout"
  print-issued-lines: true
  print-linter-name: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - copyloopvar
    - contextcheck
    - decorder
    - dupword
    - errname
    - gosec
    - noctx
    - nilerr
    - nilnil
    - prealloc
    - reassign
    - revive
    - unconvert
    - unparam
    - whitespace

  disable:
    - exhaustruct
    - exhaustive
    - goheader
    - goimports
    - lll
    - maligned
    - misspell
    - nlreturn
    - wrapcheck

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  gosec:
    excludes:
      - G104
      - G204
  govet:
    enable-all: true
  staticcheck:
    checks:
      - all
      - -SA1019
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
  dupl:
    threshold: 150
  goconst:
    min-len: 2
    min-occurrences: 2
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style
  gocyclo:
    min-complexity: 15
  goimports:
    local-prefixes: github.com/lingshu/lingshu
  lll:
    line-length: 120
  misspell:
    locale: US
  gocognit:
    min-complexity: 30
  prealloc:
    for-loops: true
  funlen:
    lines: 80
    statements: 40
  gci:
    sections:
      - standard
      - default
      - prefix(github.com/lingshu/lingshu)

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  new-from-rev: HEAD~1

  exclude-rules:
    - path: '_test\.go'
      linters:
        - dupl
        - funlen
        - gocyclo
        - gocognit
        - gosec
        - testpackage
    - path: 'migrations/'
      linters:
        - gci
    - path: 'cmd/'
      linters:
        - noctx
    - path: 'vendor/'
      linters:
        - staticcheck
