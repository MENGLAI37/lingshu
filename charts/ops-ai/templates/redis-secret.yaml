{{/*
Secret for Redis credentials
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ops-ai.redis.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ops-ai.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.redis.password }}
  redis-password: {{ .Values.redis.password | b64enc | quote }}
  {{- else }}
  redis-password: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
