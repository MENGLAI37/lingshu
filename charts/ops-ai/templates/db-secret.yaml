{{/*
Secret for database credentials
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ops-ai.database.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ops-ai.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.database.password }}
  postgresql-password: {{ .Values.database.password | b64enc | quote }}
  {{- else }}
  postgresql-password: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
