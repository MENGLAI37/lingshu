{{/*
ServiceAccount for ops-ai agent
*/}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ops-ai.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ops-ai.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
