version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lingshu-postgres
    environment:
      POSTGRES_USER: lingshu
      POSTGRES_PASSWORD: lingshu
      POSTGRES_DB: lingshu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lingshu"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lingshu-network

  redis:
    image: redis:7-alpine
    container_name: lingshu-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lingshu-network

  redis-sentinel:
    image: redis:7-alpine
    container_name: lingshu-redis-sentinel
    command: >
      sh -c "cp /tmp/sentinel.conf /etc/redis/sentinel.conf && redis-sentinel /etc/redis/sentinel.conf"
    ports:
      - "26379:26379"
    volumes:
      - ./configs/redis-sentinel.conf:/tmp/sentinel.conf:ro
      - sentinel_data:/etc/redis
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - lingshu-network

  minio:
    image: minio/minio:latest
    container_name: lingshu-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: lingshu
      MINIO_ROOT_PASSWORD: lingshu123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - lingshu-network

  chromadb:
    image: chromadb/chroma:latest
    container_name: lingshu-chromadb
    environment:
      CHROMA_SERVER_AUTH_PROVIDER: ""
      CHROMA_SERVER_AUTH_CREDENTIALS_FILE: ""
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - lingshu-network

volumes:
  postgres_data:
  redis_data:
  sentinel_data:
  minio_data:
  chroma_data:

networks:
  lingshu-network:
    driver: bridge
